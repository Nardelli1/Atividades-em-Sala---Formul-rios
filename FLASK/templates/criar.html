{% extends 'base.html' %}

{% block conteudo %}

<form action="/biblioteca/criar" method="POST">
    <h1>addadasd</h1>
    <label>ISBN: <input type="text" name="isbn" required ></label><br>
    <div>Titulo: <input type="text" name="titulo" required></div>
    <div>Autor: <input type="text" name="autor" required></div>
    <div>Genero: <input type="text" name="genero" required></div>
    <div>Ano Publicacao: <input type="text" name="ano_publicacao" required></div>
    <div>Editora: <input type="text" name="editora" required></div>
    <div>Paginas: <input type="text" name="paginas" required></div>
    <div>Status: <input type="text" name="status" required></div>
    <div>Localizacao: <input type="text" name="localizacao" required></div>

    <button type="submit">Salvar</button>

</form>

{% endblock %}
